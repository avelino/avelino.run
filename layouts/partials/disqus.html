{{- /*
  Override do internal template do Hugo pra suportar dark mode do Disqus.
  - colorscheme = "auto" faz o Disqus seguir prefers-color-scheme
  - Quando o user troca via toggle manual, themetoggle.js chama DISQUS.reset()
*/ -}}
{{- if .Site.Config.Services.Disqus.Shortname -}}
<div id="disqus_thread"></div>
<script type="application/javascript">
    (function() {
        function currentColorScheme() {
            if (document.body.classList.contains("dark-theme")) return "dark";
            var saved = localStorage.getItem("theme-storage");
            if (saved === "dark") return "dark";
            if (saved === "light") return "light";
            if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) return "dark";
            return "light";
        }

        window.disqus_config = function () {
            this.page.url = window.location.href;
            this.page.identifier = {{ with .Params.disqus_identifier }}{{ . | jsonify | safeJS }}{{ else }}window.location.pathname{{ end }};
            {{ with .Title }}this.page.title = {{ . | jsonify | safeJS }};{{ end }}
            this.page.colorscheme = currentColorScheme();
        };

        if (["localhost", "127.0.0.1"].indexOf(window.location.hostname) != -1) {
            document.getElementById('disqus_thread').innerHTML = 'Disqus comments not available by default when the website is previewed locally.';
            return;
        }
        var d = document, s = d.createElement('script'); s.async = true;
        s.src = '//' + {{ .Site.Config.Services.Disqus.Shortname | jsonify | safeJS }} + '.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);

        // Expõe pro themetoggle.js conseguir chamar reset ao alternar
        window.__resetDisqusColorScheme = function () {
            if (typeof DISQUS === "undefined") return;
            DISQUS.reset({
                reload: true,
                config: function () {
                    this.page.url = window.location.href;
                    this.page.identifier = {{ with .Params.disqus_identifier }}{{ . | jsonify | safeJS }}{{ else }}window.location.pathname{{ end }};
                    {{ with .Title }}this.page.title = {{ . | jsonify | safeJS }};{{ end }}
                    this.page.colorscheme = currentColorScheme();
                }
            });
        };
    })();
</script>
<noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
{{- end -}}
